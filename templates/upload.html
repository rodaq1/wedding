<!DOCTYPE html>
<html lang="sk">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Svadobná galéria - Nahrať</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Quattrocento:wght@400;700&family=Montserrat:wght@400;500;600;700&display=swap"
        rel="stylesheet">
    <style>
        @font-face {
            font-family: 'SvadobnyFont';
            src: url('/static/fonts/font.otf') format('opentype');
            font-weight: normal;
            font-style: normal;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        body {
            font-family: 'Montserrat', sans-serif;
            text-align: center;
            background-image: linear-gradient(180deg, #ffffff 0%, #ffffff 30%, #fef3ff 65%, #fde3ff 100%);
            background-repeat: no-repeat;
            background-attachment: fixed;
            background-size: cover;
            min-height: 100vh;
            margin: 0;
            color: #333333;
            padding: 20px;
            opacity: 0;
            animation: fadeIn 0.6s ease-out forwards;
            box-sizing: border-box;
            position: relative;
        }

        .bg-rose-custom {
            position: fixed;
            transform: translate(-50%, -50%);
            width: 110%;
            height: auto;
            top: 85%;
            pointer-events: none;
            z-index: 1;
            mix-blend-mode: multiply;
        }

        .nav-bar {
            max-width: 600px;
            margin: 10px auto 30px auto;
            text-align: right;
            position: relative;
            z-index: 2;
        }

        .nav-link {
            color: #D12B64;
            text-decoration: none;
            font-weight: bold;
            font-size: 1rem;
            transition: color 0.3s ease, transform 0.2s ease;
            display: inline-block;
        }

        .nav-link:hover {
            color: #A11D49;
            transform: translateX(-3px);
        }

        main {
            background-image: linear-gradient(180deg, #fff2fb, #fff2fb, #fff5fc, #ffffff, #ffffff);
            border-radius: 0 0 30px 30px;
            width: 100%;
            max-width: 520px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            z-index: 2;
            margin: -30px auto;
        }

        .header {
            margin-top: 10px;
            position: relative;
            z-index: 2;
        }

        h1 {
            font-family: 'SvadobnyFont', cursive, sans-serif;
            font-size: 85px;
            margin-top: 150px;
            margin-bottom: 5px;
            color: #cd7290;
            white-space: nowrap;
            display: inline-block;
        }

        h2 {
            font-family: 'Quattrocento', sans-serif;
            font-size: 36px;
            margin-top: 5px;
            color: #747474;
            margin-bottom: 15px;
            font-weight: 200;
        }

        .header p {
            font-family: 'Quattrocento', sans-serif;
            margin-top: -10px;
            font-size: 20px;
            color: #9b9b9b;
        }

        .upload-container {
            background: white;
            padding: 30px 20px 50px 20px;
            margin: 30px auto 80px auto;
            box-shadow: 0 10px 30px rgba(209, 43, 100, 0.08);
            border: 1px solid #eee;
            border-bottom: 40px solid #fff;
            transform: rotate(-1deg);
            transition: transform 0.4s ease, box-shadow 0.4s ease;
            position: relative;
            z-index: 2;
        }

        .upload-container:hover {
            transform: rotate(0deg) scale(1.02);
            box-shadow: 0 15px 35px rgba(209, 43, 100, 0.15);
        }

        .upload-area {
            width: 95%;
            margin-top: 40px;
            margin-bottom: 10px;
        }

        #status {
            font-family: 'Quattrocento', serif;
            font-weight: normal;
            margin-top: 5px;
            color: #747474;
            font-size: 1.1rem;
            text-transform: none;
            letter-spacing: 0.5px;
        }

        #cameraInput {
            display: none;
        }

        .big-button {
            background: #ffffff;
            color: #333333;
            padding: 25px 40px;
            border-radius: 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border: 1px dashed #cd7290;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.02);
            transition: background 0.3s ease, transform 0.1s ease, border-color 0.3s ease;
            width: 100%;
            box-sizing: border-box;
            font-family: 'Montserrat', sans-serif;
        }

        .big-button:hover {
            border-style: solid;
            border-color: #D12B64;
            background: #fffcfd;
        }

        .big-button:active {
            transform: scale(0.98);
        }

        /* UPRAVENÝ MODAL PODĽA image_b2d3c4.png */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(40, 20, 25, 0.3);
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal-box {
            background: #fff2fb;
            /* Svetloružové jemné pozadie z ukážky */
            padding: 45px 40px 40px 40px;
            border-radius: 40px;
            /* Výrazné veľké zaoblenie */
            max-width: 460px;
            width: 90%;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.08);
            text-align: center;
            animation: fadeIn 0.4s ease-out;
            position: relative;
            box-sizing: border-box;
        }

        .modal-seal {
            position: absolute;
            top: -100px;
            left: -80px;
            width: 200px;
            height: auto;
            z-index: 10;
            filter: drop-shadow(0 4px 10px rgba(0, 0, 0, 0.08));
        }

        .modal-box h3 {
            font-family: 'Montserrat', sans-serif;
            margin-top: 0;
            margin-bottom: 20px;
            font-size: 2.1rem;
            font-weight: 700;
            color: #cd7290;
            /* Sýta staroružová farba textu nadpisu */
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .modal-box p {
            font-family: 'Montserrat', sans-serif;
            font-size: 1.1rem;
            font-weight: 400;
            color: #d1cbd0;
            /* Svetlejší, zjemnený text z nákresu */
            line-height: 1.5;
            margin-bottom: 30px;
            padding: 0 5px;
        }

        /* Prerušované dizajnové inputy */
        .modal-box input {
            width: 100%;
            padding: 16px 20px;
            margin-bottom: 18px;
            border: 1px dashed #cd7290;
            /* Prerušovaný tenký okraj */
            border-radius: 30px;
            /* Plne zaoblené rohy */
            box-sizing: border-box;
            font-size: 1.1rem;
            font-family: 'Montserrat', sans-serif;
            text-align: center;
            background: #ffffff;
            color: #333333;
            transition: border-style 0.2s ease, border-color 0.2s ease;
        }

        .modal-box input::placeholder {
            color: #d1cbd0;
            /* Bledý placeholder */
        }

        .modal-box input:focus {
            border-style: solid;
            border-color: #cd7290;
            outline: none;
        }

        /* Veľké plné staroružové tlačidlo */
        .modal-submit {
            background: #cd7290;
            color: #ffffff;
            border: none;
            padding: 18px 30px;
            border-radius: 30px;
            font-size: 1.2rem;
            font-weight: 700;
            font-family: 'Montserrat', sans-serif;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            width: 100%;
            margin-top: 15px;
            box-shadow: 0 6px 20px rgba(205, 114, 144, 0.2);
            transition: background 0.3s ease, transform 0.1s ease;
        }

        .modal-submit:hover {
            background: #b85f7c;
        }

        .modal-submit:active {
            transform: scale(0.98);
        }

        .top-gallery-link {
            position: absolute;
            top: 35px;
            right: 40px;
            font-family: 'Montserrat', sans-serif;
            color: #cd7290;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.85rem;
            letter-spacing: 1px;
            text-transform: uppercase;
            transition: color 0.3s ease, transform 0.2s ease;
            z-index: 10;
        }

        .top-gallery-link:hover {
            color: #A11D49;
            transform: translateY(-1px);
        }

        @media (max-width: 500px) {
            body {
                padding: 0;
                margin: 0;
            }

            main {
                margin: 0;
                max-width: 100%;
                width: 100vw;
                min-height: 100vh;
                border-radius: 0;
                padding: 20px;
                justify-content: center;
            }

            h1 {
                font-size: 3.5rem;
                white-space: normal;
                word-wrap: break-word;
                line-height: 1.1;
                margin-top: 0;
                padding: 0 10px;
            }

            .bg-rose-custom {
                content: url('/static/assets/kvetyphone.svg');
                width: 100vw;
                height: 100vh;
                object-fit: cover;
                top: 50%;
                left: 50%;
                transform: translate(-50%, -50%);
                z-index: 444;
                opacity: 0.4;
            }
        }
    </style>
</head>

<body>

    <img src="/static/assets/kvety.svg" alt="Svadobná dekorácia" class="bg-rose-custom">

    <div id="welcomeModal" class="modal-overlay">
        <div class="modal-box">
            <img src="/static/assets/seal.png" alt="Svadobná pečať" class="modal-seal">
            <h3>Vitajte!</h3>
            <p>Predtým, než urobíte prvú fotku, zadajte svoje meno a e-mail. Meno sa zobrazí na fotke.</p>
            <form id="modalForm">
                <input type="text" id="popupNameInput" placeholder="Tvoje Meno" required>
                <input type="email" id="popupEmailInput" placeholder="tvoj@email.com" required>
                <button type="submit" class="modal-submit">Pokračovať k foteniu</button>
            </form>
        </div>
    </div>

    <a href="/" class="top-gallery-link">Pozrieť galériu</a>

    <main>
        <div class="header">
            <h1>Benjamín a Lenka</h1>
            <h2>Naša svadobná galéria</h2>
            <p>Odfoťte momentku a okamžite ju zdieľajte s ostatnými!</p>
        </div>

        <div class="upload-area">
            <label for="cameraInput" class="big-button">
                <span style="font-size: 1.4rem; font-weight: bold; letter-spacing: 1px; color: #333333;">OTVORIŤ
                    KAMERU</span>
                <div id="status">Pripravené na fotenie...</div>
            </label>
            <input type="file" name="photo" accept="image/*" capture="camera" id="cameraInput">
        </div>
    </main>

    <script>
        const fileInput = document.getElementById('cameraInput');
        const statusDiv = document.getElementById('status');
        const welcomeModal = document.getElementById('welcomeModal');
        const modalForm = document.getElementById('modalForm');
        const popupNameInput = document.getElementById('popupNameInput');
        const popupEmailInput = document.getElementById('popupEmailInput');

        const savedEmail = localStorage.getItem('wedding_email');
        const savedName = localStorage.getItem('wedding_name');
        if (savedEmail && savedName) {
            welcomeModal.style.display = 'none';
        }

        modalForm.addEventListener('submit', function (e) {
            e.preventDefault();
            const email = popupEmailInput.value.trim();
            const name = popupNameInput.value.trim();

            if (email && name) {
                localStorage.setItem('wedding_email', email);
                localStorage.setItem('wedding_name', name);
                welcomeModal.style.display = 'none';
            }
        });

        fileInput.addEventListener('change', function () {
            const currentEmail = localStorage.getItem('wedding_email');
            const currentName = localStorage.getItem('wedding_name');

            if (!currentEmail || !currentName) {
                welcomeModal.style.display = 'flex';
                fileInput.value = '';
                return;
            }

            if (fileInput.files.length > 0) {
                statusDiv.innerText = "Odosielame do galérie... ";

                const formData = new FormData();
                formData.append('photo', fileInput.files[0]);
                formData.append('email', currentEmail);
                formData.append('name', currentName);

                fetch('/upload', {
                    method: 'POST',
                    body: formData
                })
                    .then(response => {
                        if (response.ok) {
                            statusDiv.innerText = "Krásna momentka! Chcete urobiť ďalšiu? ";
                            fileInput.value = '';
                        } else {
                            statusDiv.innerText = "Ojoj! Niečo sa pokazilo. Skús znovu?";
                        }
                    })
                    .catch(error => {
                        statusDiv.innerText = "Chyba pripojenia na server.";
                    });
            }
        });
    </script>
</body>

</html>
